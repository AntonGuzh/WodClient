name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            output_name: wod_character_sheet.exe
            asset_name: wod_character_sheet-windows.exe
            pyinstaller_args: --onefile --windowed --icon=static/img/favicon.ico --add-data "static;static" --add-data "src;src" --add-data "utils.py;."
          
          - os: macos-latest
            output_name: wod_character_sheet
            asset_name: wod_character_sheet-macos
            pyinstaller_args: --onefile --windowed --icon=static/img/favicon.icns --add-data "static:static" --add-data "src:src" --add-data "utils.py:."
          
          - os: ubuntu-latest
            output_name: wod_character_sheet
            asset_name: wod_character_sheet-linux
            pyinstaller_args: --onefile --windowed --add-data "static:static" --add-data "src:src" --add-data "utils.py:."

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Build with PyInstaller
      run: |
        pyinstaller ${{ matrix.pyinstaller_args }} main.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.output_name }}

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/${{ matrix.output_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}